name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nightops
          POSTGRES_PASSWORD: nightops_test
          POSTGRES_DB: nightops_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://nightops:nightops_test@localhost:5432/nightops_test
      JWT_SECRET: test-secret
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter @nightops/shared build

      - name: Generate Prisma client
        run: pnpm --filter @nightops/api prisma:generate

      - name: Run tests
        run: pnpm turbo test

      - name: Build
        run: pnpm turbo build
