services:
  db:
    image: postgres:16-alpine
    container_name: nightops-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: nightops
      POSTGRES_PASSWORD: nightops_dev
      POSTGRES_DB: nightops
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nightops"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nightops-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db-data:
